version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: fetch-kit
    main: .
    binary: fetch-kit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: fetch-cli
    main: ./cmd/fetch-cli
    binary: fetch-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: fetch-kit
    ids:
      - fetch-kit
    name_template: "fetch-kit_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: fetch-cli
    ids:
      - fetch-cli
    name_template: "fetch-cli_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: fetch-kit
    ids:
      - fetch-kit
    repository:
      owner: nguyenvanduocit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/nguyenvanduocit/fetch-kit"
    description: "fetch-kit - MCP server"
    install: |
      bin.install "fetch-kit"

  - name: fetch-cli
    ids:
      - fetch-cli
    repository:
      owner: nguyenvanduocit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/nguyenvanduocit/fetch-kit"
    description: "fetch-cli - CLI tool"
    install: |
      bin.install "fetch-cli"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
# Trigger workflow
